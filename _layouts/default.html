<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">

    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <section class="page-header" id="top">
      <h1 class="project-name">{{ site.title }}</h1>
      <h2 class="project-tagline">{{ site.description }}</h2>
      <h2 class="project-tagline">{% if page.venue %}held as part of <b>{{ page.venue }} {{ page.year }}</b>{% endif %}</h2>

      <div class="header-buttons">
        {% for item in page.nav %}
          <a class="btn" href="{{ item.url }}">{{ item.title }}</a>
        {% endfor %}
      </div>
    </section>

    <main id="content" class="main-content" role="main">
      {{ content }}
    </main>
  <footer>
    <a href="{{ '/imprint/' | relative_url }}" rel="noopener">
      Imprint
    </a>
    |
    <a href="{{ '/privacy/' | relative_url }}" rel="noopener">
      Privacy
    </a>
  </footer>
  </body>
</html>
